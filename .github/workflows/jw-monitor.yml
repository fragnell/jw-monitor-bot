name: JW Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 5-19 * * *'

concurrency:
  group: jw-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create state file if missing
        run: |
          if [ ! -f jw_state.json ]; then
            echo '{"videos":[],"news":[],"magazines":[]}' > jw_state.json
          fi

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
        run: |
          python jw_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add jw_state.json
          if ! git diff --cached --quiet; then
            git commit -m "Update jw_state"
            git push
          fi
