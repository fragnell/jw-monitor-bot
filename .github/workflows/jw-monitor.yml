name: JW Monitor

on:
  workflow_dispatch:

concurrency:
  group: jw-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create state file if missing
        run: |
          if [ ! -f jw_state.json ]; then
            echo '{"videos":[],"news":[],"magazines":[],"homepage":[],"daily_text_id":""}' > jw_state.json
          fi

      - name: Fetch daily text via curl
        run: |
          TODAY=$(TZ="Europe/Rome" date +%Y/%-m/%-d)
          echo "TODAY_ISO=$(TZ="Europe/Rome" date +%Y-%m-%d)" >> $GITHUB_ENV
          echo "Data italiana: ${TODAY}"
          curl -s \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: it-IT,it;q=0.9" \
            -H "Accept-Encoding: gzip, deflate, br" \
            --max-time 30 \
            --compressed \
            "https://wol.jw.org/it/wol/h/r6/lp-i/${TODAY}" \
            -o wol_page.html
          echo "File size wol_page: $(wc -c < wol_page.html) bytes"

      - name: Fetch meetings page via curl
        run: |
          # Costruisce l'URL adunanze con anno e numero settimana ISO
          YEAR=$(TZ="Europe/Rome" date +%Y)
          WEEK=$(TZ="Europe/Rome" date +%-V)
          FULL_MEETINGS_URL="https://wol.jw.org/it/wol/meetings/r6/lp-i/${YEAR}/${WEEK}"
          echo "URL adunanze: ${FULL_MEETINGS_URL}"
          curl -s \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: it-IT,it;q=0.9" \
            -H "Accept-Encoding: gzip, deflate, br" \
            --max-time 30 \
            --compressed \
            "${FULL_MEETINGS_URL}" \
            -o wol_meetings.html
          echo "File size wol_meetings: $(wc -c < wol_meetings.html) bytes"

          # Estrai il link della Torre di Guardia (secondo link /wol/d/)
          WT_URL=$(grep -o 'href="/it/wol/d/[^"]*"' wol_meetings.html | tail -1 | sed 's/href="//;s/"//')
          # Estrai il link adunanza infrasettimanale (primo link /wol/d/)
          MEETING_URL=$(grep -o 'href="/it/wol/d/[^"]*"' wol_meetings.html | head -1 | sed 's/href="//;s/"//')
          if [ -z "$WT_URL" ]; then
            echo "Link Torre di Guardia non trovato, skip."
            touch wol_watchtower.html
          else
            FULL_WT_URL="https://wol.jw.org${WT_URL}"
            echo "URL Torre di Guardia: ${FULL_WT_URL}"
            echo "WATCHTOWER_URL=${FULL_WT_URL}" >> $GITHUB_ENV
            curl -s \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              -H "Accept-Language: it-IT,it;q=0.9" \
              -H "Accept-Encoding: gzip, deflate, br" \
              --max-time 30 \
              --compressed \
              "${FULL_WT_URL}" \
              -o wol_watchtower.html
            echo "File size wol_watchtower: $(wc -c < wol_watchtower.html) bytes"
          fi
          if [ -z "$MEETING_URL" ]; then
            echo "Link adunanza infrasettimanale non trovato, skip."
            touch wol_meetings_detail.html
          else
            FULL_MEETING_URL="https://wol.jw.org${MEETING_URL}"
            echo "URL adunanza: ${FULL_MEETING_URL}"
            echo "MEETING_URL=${FULL_MEETING_URL}" >> $GITHUB_ENV
            curl -s \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              -H "Accept-Language: it-IT,it;q=0.9" \
              -H "Accept-Encoding: gzip, deflate, br" \
              --max-time 30 \
              --compressed \
              "${FULL_MEETING_URL}" \
              -o wol_meetings_detail.html
            echo "File size wol_meetings_detail: $(wc -c < wol_meetings_detail.html) bytes"
          fi

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          TODAY_ISO: ${{ env.TODAY_ISO }}
        run: |
          python jw_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add jw_state.json jw_log.json
          if ! git diff --cached --quiet; then
            git commit -m "Update jw_state and jw_log"
            git push
          fi
